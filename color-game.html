<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Match — Mind Game</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1e1e1e;
  --border:rgba(255,255,255,0.07);
  --white:#f0ede8;
  --gray:#888;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(10,10,10,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--white);text-decoration:none;letter-spacing:-0.02em;}
.nav-logo span{color:#f0c040;}
.score-display{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--gray);}
.score-display b{color:#f0c040;}

/* WRAP */
.game-wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px;}

/* HERO */
.game-hero{text-align:center;margin-bottom:40px;}
.game-hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:8px;}
.game-hero h1 span{color:#f0c040;}
.game-hero p{color:var(--gray);font-size:0.9rem;}

/* LEVEL BADGE */
.level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.level-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:7px 16px;font-family:'Space Mono',monospace;font-size:0.78rem;}
.level-dot{width:8px;height:8px;border-radius:50%;background:#f0c040;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}
.lives{display:flex;gap:4px;font-size:1.1rem;}

/* STATUS MESSAGE */
.status-msg{
  text-align:center;
  font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:700;
  height:36px;line-height:36px;
  margin-bottom:20px;
  border-radius:10px;
  transition:all 0.3s;
  letter-spacing:0.02em;
}
.status-msg.correct{background:rgba(0,200,83,0.12);color:#00c853;}
.status-msg.wrong{background:rgba(231,76,60,0.12);color:#e74c3c;}
.status-msg.watch{background:rgba(240,192,64,0.10);color:#f0c040;}

/* GAME MODES */
.mode-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.mode-tab{padding:8px 20px;border-radius:100px;font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--gray);transition:all 0.2s;}
.mode-tab.active{background:#f0c040;border-color:#f0c040;color:#0a0a0a;}

/* ── GAME 1: COLOR SEQUENCE ── */
.sequence-display{
  display:flex;justify-content:center;align-items:center;
  height:160px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:24px;
  font-size:3rem;
  transition:all 0.15s;
  position:relative;
  overflow:hidden;
}
.sequence-display .flash-overlay{
  position:absolute;inset:0;
  border-radius:var(--radius);
  opacity:0;transition:opacity 0.1s;
}

.color-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:24px;
}
.color-btn{
  height:72px;
  border-radius:14px;
  border:2px solid transparent;
  cursor:pointer;
  transition:all 0.18s;
  position:relative;
  overflow:hidden;
}
.color-btn:hover{transform:scale(1.04);border-color:rgba(255,255,255,0.2);}
.color-btn:active{transform:scale(0.96);}
.color-btn.highlight{transform:scale(0.92);filter:brightness(1.4);border-color:rgba(255,255,255,0.5);}

/* ── GAME 2: COLOR NAME MATCH ── */
.name-game{text-align:center;}
.color-word{
  font-family:'Syne',sans-serif;
  font-size:clamp(2rem,8vw,3.5rem);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:20px 0 32px;
  padding:20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  transition:color 0.3s;
}
.name-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.name-btn{
  padding:18px;
  border-radius:14px;
  font-family:'Syne',sans-serif;
  font-size:0.9rem;font-weight:700;
  cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--white);
  transition:all 0.2s;
  letter-spacing:0.02em;
}
.name-btn:hover{border-color:rgba(240,192,64,0.4);transform:translateY(-2px);}
.name-btn.correct-ans{background:rgba(0,200,83,0.15);border-color:#00c853;color:#00c853;}
.name-btn.wrong-ans{background:rgba(231,76,60,0.12);border-color:#e74c3c;color:#e74c3c;}

/* CONTROLS */
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:10px;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:#f0c040;color:#0a0a0a;}
.btn-primary:hover{background:#f5cf60;transform:translateY(-1px);}
.btn-ghost{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.btn-ghost:hover{border-color:rgba(240,192,64,0.3);}

/* PROGRESS */
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:28px;overflow:hidden;}
.progress-fill{height:100%;background:#f0c040;border-radius:2px;transition:width 0.4s ease;}

/* HIGH SCORE */
.score-board{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-top:28px;
}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
.score-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#f0c040;display:block;}
.score-lbl{font-size:0.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

/* GAME OVER */
.game-over{text-align:center;padding:40px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.game-over h2{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:8px;}
.game-over .final-score{font-family:'Space Mono',monospace;font-size:3rem;color:#f0c040;margin:16px 0;}

/* THREE DOT FAB */
.fab-wrap{position:fixed;bottom:28px;right:24px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.fab-menu{display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(10px);transition:all 0.25s ease;}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0);}
.fab-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;color:var(--white);text-decoration:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:all 0.2s;cursor:pointer;}
.fab-item:hover{border-color:#f0c040;color:#f0c040;transform:translateX(-4px);}
.fab-btn{width:52px;height:52px;border-radius:50%;background:#f0c040;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,192,64,0.3);transition:all 0.2s;font-size:1.4rem;color:#0a0a0a;font-family:'Syne',sans-serif;font-weight:800;}
.fab-btn:hover{transform:scale(1.05);}

footer{text-align:center;padding:24px;border-top:1px solid var(--border);font-size:0.78rem;color:var(--gray);}
footer a{color:#f0c040;text-decoration:none;}

@media(max-width:500px){
  .color-buttons{grid-template-columns:repeat(4,1fr);gap:8px;}
  .color-btn{height:58px;}
  .name-options{grid-template-columns:1fr 1fr;}
  .score-board{grid-template-columns:repeat(3,1fr);}
  nav{padding:0 16px;}
}
</style>
</head>
<body>

<nav>
  <a href="https://mmalam.in" class="nav-logo">mm<span>.</span>play</a>
  <div class="score-display">Score: <b id="nav-score">0</b></div>
</nav>

<div class="game-wrap">
  <div class="game-hero">
    <h1>Color <span>Mind</span> Game</h1>
    <p>Test your memory and reaction speed</p>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('sequence',this)">🧠 Memory Sequence</button>
    <button class="mode-tab" onclick="switchMode('namematch',this)">🎨 Color Name Match</button>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- LEVEL + LIVES -->
  <div class="level-row">
    <div class="level-badge"><div class="level-dot"></div><span id="level-txt">Level 1</span></div>
    <div class="lives" id="lives-display">❤️❤️❤️</div>
  </div>

  <!-- STATUS -->
  <div class="status-msg" id="status-msg"></div>

  <!-- ══ GAME 1: SEQUENCE ══ -->
  <div id="game-sequence">
    <div class="sequence-display" id="seq-display">
      <span id="seq-emoji">👁️</span>
      <div class="flash-overlay" id="flash-overlay"></div>
    </div>
    <div class="color-buttons" id="color-btns"></div>
    <div class="controls">
      <button class="btn btn-primary" id="start-btn" onclick="startSequence()">▶ Start Game</button>
    </div>
  </div>

  <!-- ══ GAME 2: NAME MATCH ══ -->
  <div id="game-namematch" style="display:none;">
    <div class="name-game">
      <p style="color:var(--gray);font-size:0.85rem;margin-bottom:8px;">What COLOR is this text written in?</p>
      <div class="color-word" id="color-word">RED</div>
      <div class="name-options" id="name-options"></div>
    </div>
    <div class="controls" style="margin-top:20px;">
      <button class="btn btn-primary" id="nm-start-btn" onclick="startNameMatch()">▶ Start Game</button>
    </div>
  </div>

  <!-- SCORE BOARD -->
  <div class="score-board">
    <div class="score-card"><span class="score-num" id="sb-score">0</span><span class="score-lbl">Score</span></div>
    <div class="score-card"><span class="score-num" id="sb-best">0</span><span class="score-lbl">Best</span></div>
    <div class="score-card"><span class="score-num" id="sb-streak">0</span><span class="score-lbl">Streak</span></div>
  </div>

</div>

<!-- THREE DOT FAB -->
<div class="fab-wrap">
  <div class="fab-menu" id="fab-menu">
    <a class="fab-item" href="https://mmalam.in/tools" target="_blank">🛠️ More Tools</a>
    <a class="fab-item" href="https://mmalam.in/anon" target="_blank">💌 Send Message</a>
    <a class="fab-item" href="https://mmalam.in" target="_blank">🌐 Visit Portfolio</a>
  </div>
  <button class="fab-btn" onclick="toggleFab()" id="fab-btn">⋯</button>
</div>

<footer>Built by <a href="https://mmalam.in" target="_blank">mmalam.in</a></footer>

<script>
// ── COLORS ──
const COLORS = [
  { name:'Red',    hex:'#e74c3c', emoji:'🔴' },
  { name:'Blue',   hex:'#3498db', emoji:'🔵' },
  { name:'Green',  hex:'#2ecc71', emoji:'🟢' },
  { name:'Yellow', hex:'#f1c40f', emoji:'🟡' },
  { name:'Purple', hex:'#9b59b6', emoji:'🟣' },
  { name:'Orange', hex:'#e67e22', emoji:'🟠' },
  { name:'Pink',   hex:'#e91e8c', emoji:'🩷' },
  { name:'Teal',   hex:'#1abc9c', emoji:'🩵' },
];

let score = 0, best = parseInt(localStorage.getItem('color_best')||'0'), streak = 0, lives = 3;
let level = 1, currentMode = 'sequence';
let sequence = [], playerInput = [], isShowing = false;
let nmTimer = null, nmActive = false;

function updateScoreBoard() {
  document.getElementById('sb-score').textContent = score;
  document.getElementById('sb-best').textContent = best;
  document.getElementById('sb-streak').textContent = streak;
  document.getElementById('nav-score').textContent = score;
  if (score > best) { best = score; localStorage.setItem('color_best', best); document.getElementById('sb-best').textContent = best; }
}

function setStatus(msg, type='') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

function updateLives() {
  document.getElementById('lives-display').textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = Math.min(100, (score / (level * 5)) * 100) + '%';
  document.getElementById('level-txt').textContent = 'Level ' + level;
}

function switchMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('game-sequence').style.display = mode === 'sequence' ? 'block' : 'none';
  document.getElementById('game-namematch').style.display = mode === 'namematch' ? 'block' : 'none';
  resetGame();
}

function resetGame() {
  score = 0; streak = 0; lives = 3; level = 1;
  sequence = []; playerInput = []; isShowing = false; nmActive = false;
  if (nmTimer) clearTimeout(nmTimer);
  updateScoreBoard(); updateLives(); updateProgress();
  setStatus('');
  if (currentMode === 'sequence') {
    buildColorButtons();
    document.getElementById('start-btn').style.display = 'inline-flex';
    document.getElementById('seq-emoji').textContent = '👁️';
  } else {
    document.getElementById('nm-start-btn').style.display = 'inline-flex';
    document.getElementById('name-options').innerHTML = '';
    document.getElementById('color-word').textContent = 'Ready?';
    document.getElementById('color-word').style.color = '#f0ede8';
  }
}

// ══ GAME 1: SEQUENCE ══
function buildColorButtons() {
  const cols = Math.min(4 + Math.floor(level/2), COLORS.length);
  const activeColors = COLORS.slice(0, cols);
  const wrap = document.getElementById('color-btns');
  wrap.innerHTML = activeColors.map((c,i) => `
    <button class="color-btn" id="cbtn-${i}" style="background:${c.hex};"
      onclick="playerClick(${i})" disabled title="${c.name}"></button>
  `).join('');
}

function startSequence() {
  document.getElementById('start-btn').style.display = 'none';
  buildColorButtons();
  sequence = [];
  addToSequence();
}

function addToSequence() {
  const cols = Math.min(4 + Math.floor(level/2), COLORS.length);
  sequence.push(Math.floor(Math.random() * cols));
  playerInput = [];
  showSequence();
}

async function showSequence() {
  isShowing = true;
  setStatus('Watch the sequence...', 'watch');
  disableButtons(true);
  document.getElementById('seq-emoji').textContent = '👁️';
  await sleep(600);

  for (let i = 0; i < sequence.length; i++) {
    await highlightBtn(sequence[i]);
    await sleep(300);
  }

  isShowing = false;
  disableButtons(false);
  setStatus(`Now repeat! (${sequence.length} steps)`, 'watch');
  document.getElementById('seq-emoji').textContent = '👆';
}

async function highlightBtn(idx) {
  const btn = document.getElementById('cbtn-' + idx);
  const overlay = document.getElementById('flash-overlay');
  const color = COLORS[idx];
  overlay.style.background = color.hex;
  overlay.style.opacity = '0.3';
  btn.classList.add('highlight');
  document.getElementById('seq-display').style.boxShadow = `0 0 40px ${color.hex}44`;
  document.getElementById('seq-emoji').textContent = color.emoji;
  await sleep(500);
  btn.classList.remove('highlight');
  overlay.style.opacity = '0';
  document.getElementById('seq-display').style.boxShadow = '';
  document.getElementById('seq-emoji').textContent = '👁️';
  await sleep(200);
}

function playerClick(idx) {
  if (isShowing) return;
  playerInput.push(idx);
  const pos = playerInput.length - 1;

  const btn = document.getElementById('cbtn-' + idx);
  btn.style.transform = 'scale(0.92)';
  btn.style.filter = 'brightness(1.3)';
  setTimeout(() => { btn.style.transform=''; btn.style.filter=''; }, 180);

  if (playerInput[pos] !== sequence[pos]) {
    // Wrong
    lives--;
    streak = 0;
    updateLives();
    setStatus('✗ Wrong! Try again', 'wrong');
    if (lives <= 0) { gameOver(); return; }
    setTimeout(() => showSequence(), 1000);
    return;
  }

  if (playerInput.length === sequence.length) {
    // Correct sequence!
    score += sequence.length * level;
    streak++;
    if (streak % 3 === 0) level++;
    updateScoreBoard(); updateProgress();
    setStatus('✓ Perfect! +' + (sequence.length * level), 'correct');
    document.getElementById('seq-emoji').textContent = '🎉';
    setTimeout(() => addToSequence(), 900);
  }
}

function disableButtons(disabled) {
  document.querySelectorAll('.color-btn').forEach(b => b.disabled = disabled);
}

// ══ GAME 2: NAME MATCH ══
const NM_COLORS = ['Red','Blue','Green','Yellow','Purple','Orange','Pink','Teal'];
const NM_HEX = {'Red':'#e74c3c','Blue':'#3498db','Green':'#2ecc71','Yellow':'#f1c40f','Purple':'#9b59b6','Orange':'#e67e22','Pink':'#e91e8c','Teal':'#1abc9c'};

let nmTimeLeft = 10;

function startNameMatch() {
  document.getElementById('nm-start-btn').style.display = 'none';
  nmActive = true;
  lives = 3; score = 0; streak = 0;
  updateLives(); updateScoreBoard();
  nextNameQuestion();
}

function nextNameQuestion() {
  if (!nmActive) return;
  // Pick a word and a random color to display it in
  const wordIdx = Math.floor(Math.random() * NM_COLORS.length);
  const colorIdx = Math.floor(Math.random() * NM_COLORS.length);
  const word = NM_COLORS[wordIdx];
  const displayColor = NM_COLORS[colorIdx]; // the INK color
  const correctAnswer = displayColor; // answer = the ink color

  document.getElementById('color-word').textContent = word;
  document.getElementById('color-word').style.color = NM_HEX[displayColor];

  // 4 options including correct
  let opts = [correctAnswer];
  while (opts.length < 4) {
    const r = NM_COLORS[Math.floor(Math.random() * NM_COLORS.length)];
    if (!opts.includes(r)) opts.push(r);
  }
  opts.sort(() => Math.random() - 0.5);

  const wrap = document.getElementById('name-options');
  wrap.innerHTML = opts.map(o => `
    <button class="name-btn" onclick="nmAnswer('${o}','${correctAnswer}',this)">${o}</button>
  `).join('');

  setStatus('What color is the TEXT written in?', 'watch');
}

function nmAnswer(chosen, correct, btn) {
  if (!nmActive) return;
  document.querySelectorAll('.name-btn').forEach(b => b.onclick = null);

  if (chosen === correct) {
    btn.classList.add('correct-ans');
    score += 10 * level;
    streak++;
    if (streak % 5 === 0) level++;
    setStatus('✓ Correct! +' + (10*level), 'correct');
  } else {
    btn.classList.add('wrong-ans');
    // show correct
    document.querySelectorAll('.name-btn').forEach(b => { if(b.textContent===correct) b.classList.add('correct-ans'); });
    lives--;
    streak = 0;
    setStatus('✗ Wrong! It was ' + correct, 'wrong');
    if (lives <= 0) { updateLives(); updateScoreBoard(); setTimeout(gameOver, 800); return; }
  }
  updateLives(); updateScoreBoard(); updateProgress();
  setTimeout(nextNameQuestion, 900);
}

// ══ GAME OVER ══
function gameOver() {
  nmActive = false;
  const wrap = document.querySelector('.game-wrap');
  const msg = score > best ? '🏆 New High Score!' : '😔 Game Over!';
  setStatus(msg, score > best ? 'correct' : 'wrong');
  if (score > best) { best = score; localStorage.setItem('color_best', best); updateScoreBoard(); }

  setTimeout(() => {
    if (currentMode === 'sequence') {
      document.getElementById('color-btns').innerHTML = '';
      document.getElementById('seq-emoji').textContent = '💀';
    } else {
      document.getElementById('name-options').innerHTML = '';
      document.getElementById('color-word').style.color = '#888';
    }
    const restartBtn = currentMode === 'sequence'
      ? document.getElementById('start-btn')
      : document.getElementById('nm-start-btn');
    restartBtn.textContent = '↺ Play Again';
    restartBtn.style.display = 'inline-flex';
  }, 500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// FAB
function toggleFab() {
  const menu = document.getElementById('fab-menu');
  const btn = document.getElementById('fab-btn');
  menu.classList.toggle('open');
  btn.textContent = menu.classList.contains('open') ? '✕' : '⋯';
}
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.fab-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('fab-menu').classList.remove('open');
    document.getElementById('fab-btn').textContent = '⋯';
  }
});

// INIT
buildColorButtons();
updateScoreBoard();
updateLives();
</script>
</body>
</html>
