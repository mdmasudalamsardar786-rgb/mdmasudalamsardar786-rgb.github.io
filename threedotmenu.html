<!-- FAB STYLES -->
<style>
.mm-fab-wrap {
  position: fixed;
  bottom: 28px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.mm-fab-menu {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mm-fab-menu.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.mm-fab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--white, #fff);
  border: 1px solid var(--line, rgba(0,0,0,0.08));
  border-radius: 100px;
  padding: 11px 20px;
  font-family: 'Syne', 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--ink, #1a1814);
  text-decoration: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.09);
  transition: all 0.2s ease;
  cursor: pointer;
  letter-spacing: 0.01em;
}
.mm-fab-item:hover {
  border-color: var(--accent, #C8A96E);
  color: var(--accent, #C8A96E);
  transform: translateX(-5px);
  box-shadow: 0 6px 24px rgba(200,169,110,0.18);
}
.mm-fab-item .mm-fab-icon {
  font-size: 1rem;
  line-height: 1;
}

/* Staggered entrance animation */
.mm-fab-menu.open .mm-fab-item:nth-child(1) { transition-delay: 0.00s; }
.mm-fab-menu.open .mm-fab-item:nth-child(2) { transition-delay: 0.05s; }
.mm-fab-menu.open .mm-fab-item:nth-child(3) { transition-delay: 0.10s; }
.mm-fab-menu.open .mm-fab-item:nth-child(4) { transition-delay: 0.15s; }

.mm-fab-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--ink, #1a1814);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(26,24,20,0.25);
  transition: all 0.25s ease;
  position: relative;
  flex-shrink: 0;
}
.mm-fab-btn:hover {
  background: var(--accent, #C8A96E);
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(200,169,110,0.35);
}

/* Three dots → X animation */
.mm-fab-btn .dots-icon,
.mm-fab-btn .close-icon {
  position: absolute;
  transition: all 0.25s ease;
  font-size: 1.3rem;
  color: var(--white, #fff);
  line-height: 1;
}
.mm-fab-btn .close-icon {
  opacity: 0;
  transform: rotate(-90deg) scale(0.6);
  font-size: 1rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
}
.mm-fab-btn.active .dots-icon {
  opacity: 0;
  transform: rotate(90deg) scale(0.6);
}
.mm-fab-btn.active .close-icon {
  opacity: 1;
  transform: rotate(0deg) scale(1);
}
.mm-fab-btn.active {
  background: var(--accent, #C8A96E);
}

@media (max-width: 600px) {
  .mm-fab-wrap { bottom: 20px; right: 16px; }
  .mm-fab-item { padding: 10px 16px; font-size: 0.78rem; }
}
</style>

<!-- FAB HTML -->
<div class="mm-fab-wrap" id="mm-fab-wrap">

  <!-- MENU ITEMS -->
  <div class="mm-fab-menu" id="mm-fab-menu">

    <a class="mm-fab-item" href="https://mmalam.in/game" target="_blank">
      <span class="mm-fab-icon">🎮</span> Colour Game
    </a>

    <a class="mm-fab-item" href="https://mmalam.in/tools" target="_blank">
      <span class="mm-fab-icon">🛠️</span> Tool Kit
    </a>

  </div>

  <!-- THREE DOT BUTTON -->
  <button class="mm-fab-btn" id="mm-fab-btn" onclick="mmToggleFab()" aria-label="More options">
    <span class="dots-icon">⋯</span>
    <span class="close-icon">✕</span>
  </button>

</div>

<!-- FAB SCRIPT -->
<script>
(function() {
  function mmToggleFab() {
    var menu = document.getElementById('mm-fab-menu');
    var btn  = document.getElementById('mm-fab-btn');
    var isOpen = menu.classList.contains('open');
    if (isOpen) {
      menu.classList.remove('open');
      btn.classList.remove('active');
    } else {
      menu.classList.add('open');
      btn.classList.add('active');
    }
  }
  window.mmToggleFab = mmToggleFab;

  // Close when clicking outside
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById('mm-fab-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('mm-fab-menu').classList.remove('open');
      document.getElementById('mm-fab-btn').classList.remove('active');
    }
  });
})();
</script>
